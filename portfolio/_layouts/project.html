---
layout: default
---

<div class="content-wrap">
  <a href="{{ '/projects' | relative_url }}" class="back-link">← All projects</a>

  <header class="post-header">
    <div class="post-eyebrow">
      {% if page.tech %}<span class="post-tag">{{ page.tech | join: " · " }}</span>{% endif %}
      {% if page.status %}<span class="post-date">{{ page.status }}</span>{% endif %}
    </div>
    <h1>{{ page.title }}</h1>
  </header>

  {% if page.image %}
  <img src="{{ page.image | relative_url }}" alt="{{ page.title }}" style="width:100%; margin-bottom: 2rem; border-radius: 2px;">
  {% endif %}

  <article class="post-content">
    {{ content }}
  </article>

  <div style="display:flex; gap:1.5rem; padding: 2rem 0; border-top: 1px solid var(--border);">
    {% if page.github %}<a href="{{ page.github }}" target="_blank" class="back-link" style="margin:0;">GitHub →</a>{% endif %}
    {% if page.demo %}<a href="{{ page.demo }}" target="_blank" class="back-link" style="margin:0;">Live demo →</a>{% endif %}
  </div>
</div>
