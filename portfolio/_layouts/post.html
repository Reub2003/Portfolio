---
layout: default
---

<div class="content-wrap">
  <a href="{{ '/blog' | relative_url }}" class="back-link">← All posts</a>

  <header class="post-header">
    <div class="post-eyebrow">
      {% if page.tags.first %}<span class="post-tag">{{ page.tags.first }}</span>{% endif %}
      <span class="post-date">{{ page.date | date: "%B %-d, %Y" }}</span>
    </div>
    <h1>{{ page.title }}</h1>
  </header>

  <article class="post-content">
    {{ content }}
  </article>
</div>
